<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBISL Campus | Bilingual Practicum</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX (Stable Release) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            900: '#064e3b',
                            950: '#022c22',
                        },
                        tech: {
                            500: '#3b82f6',
                            900: '#1e3a8a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        sinhala: ['Iskoola Pota', 'Nirmala UI', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* Premium custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }

        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Print Optimization */
        @media print {
            body { background: white !important; color: black !important; }
            .print-hide { display: none !important; }
            .print-glass { background: white !important; border: 1px solid #cbd5e1 !important; color: black !important; box-shadow: none !important; filter: none !important; }
            .print-text { color: black !important; }
            .print-text-muted { color: #475569 !important; }
            #root { height: auto !important; overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 font-sans min-h-screen overflow-x-hidden selection:bg-brand-500 selection:text-white">
    <div id="root" class="min-h-screen flex flex-col"></div>

    <!-- Configure Babel with data-presets to prevent ESM helper dynamic importing errors -->
    <script type="text/babel" data-presets="react">
        const { useState, useEffect } = React;

        // --- INLINE ICONS ---
        const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
        const IconBuilding = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>;
        const IconFlask = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/><path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconTerminal = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg>;
        const IconMessage = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const IconPrinter = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconWorkflow = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 7v8"/><path d="M12 7v4"/><path d="M16 7v10"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconClose = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>;

        // --- SUB-COMPONENTS ---

        // 1. CASE INSIGHT
        const TabCaseInsight = ({ t, lang }) => (
            <div className="space-y-6 animate-fade-in">
                <div className="mb-8">
                    <h2 className="text-2xl md:text-3xl font-extrabold text-brand-500 mb-2 print-text">
                        {t("Zenith Corp: The Hybrid Reality", "සෙනිත් සමාගම: දෙමුහුන් යථාර්ථය")}
                    </h2>
                    <p className="text-slate-400 print-text-muted">
                        {t("Module 1 Core Case Study Breakdown", "මොඩියුලය 1: ප්‍රධාන සිද්ධි අධ්‍යයන විශ්ලේෂණය")}
                    </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {/* Problem */}
                    <div className="glass-panel print-glass p-6 rounded-2xl border-t-4 border-t-red-500 shadow-xl">
                        <div className="text-red-400 mb-4 font-bold tracking-widest text-sm">
                            {t("01 / PROBLEM", "01 / ගැටලුව")}
                        </div>
                        <h3 className="text-xl font-semibold mb-3 print-text">
                            {t("Rigid Rule Books", "දැඩි නීති රීති මාලාව")}
                        </h3>
                        <p className={`text-slate-300 text-sm leading-relaxed print-text-muted ${lang === 'si' ? 'font-sinhala' : ''}`}>
                            {t(
                                "The transition caused acute pain for long-term administrators who struggled without rigid rule books, exposing the tension between legacy stability and modern agility.",
                                "ආයතනික වෙනස්වීම් නිසා දැඩි නීති රීති නොමැතිව කටයුතු කිරීමට හුරු වූ දිගුකාලීන පරිපාලකයින්ට දැඩි දුෂ්කරතා ඇති වූ අතර, පැරණි ස්ථාවරත්වය සහ නවීන වේගවත් බව අතර ගැටුම මතු විය."
                            )}
                        </p>
                    </div>

                    {/* Approach */}
                    <div className="glass-panel print-glass p-6 rounded-2xl border-t-4 border-t-blue-500 shadow-xl">
                        <div className="text-blue-400 mb-4 font-bold tracking-widest text-sm">
                            {t("02 / APPROACH", "02 / ප්‍රවේශය")}
                        </div>
                        <h3 className="text-xl font-semibold mb-3 print-text">
                            {t("Hybrid Planning Model", "දෙමුහුන් සැලසුම් ආකෘතිය")}
                        </h3>
                        <p className={`text-slate-300 text-sm leading-relaxed print-text-muted ${lang === 'si' ? 'font-sinhala' : ''}`}>
                            {t(
                                "Implementing an Automated Administrative Core for annual corporate vision/compliance, merged with a Flat, Agile Management structure for real-time pivots.",
                                "වාර්ෂික ආයතනික දැක්ම සහ අනුකූලතාවය සඳහා ස්වයංක්‍රීය පරිපාලන හරයක් සමඟ, ක්ෂණික තීරණ සඳහා පැතලි, වේගවත් කළමනාකරණ ව්‍යුහයක් ඒකාබද්ධ කිරීම."
                            )}
                        </p>
                    </div>

                    {/* Result */}
                    <div className="glass-panel print-glass p-6 rounded-2xl border-t-4 border-t-brand-500 shadow-xl">
                        <div className="text-brand-400 mb-4 font-bold tracking-widest text-sm">
                            {t("03 / RESULT", "03 / ප්‍රතිඵලය")}
                        </div>
                        <h3 className="text-xl font-semibold mb-3 print-text">
                            {t("Agile Breakthrough", "වේගවත් සංවර්ධන ජයග්‍රහණය")}
                        </h3>
                        <p className={`text-slate-300 text-sm leading-relaxed print-text-muted ${lang === 'si' ? 'font-sinhala' : ''}`}>
                            {t(
                                "A highly optimized corporate machine resulting in -3 Management Layers and +40% Employee Engagement.",
                                "කළමනාකරණ ස්ථර 3ක් අඩු කිරීම සහ සේවක සහභාගීත්වය 40%කින් වැඩි කරමින් ඉහළ ප්‍රශස්තකරණයකට ලක්වූ ආයතනික ව්‍යුහයක් නිර්මාණය විය."
                            )}
                        </p>
                    </div>
                </div>
            </div>
        );

        // 2. DEEP DIVE ANALYSIS
        const TabDeepDive = ({ t, lang }) => {
            const concepts = [
                {
                    title: t("Management vs. Administration", "කළමනාකරණය සහ පරිපාලනය"),
                    desc: t(
                        "Management is strategic, fluid, and action-oriented (focusing on 'How' and 'Who'). Administration is policy-driven, procedural, and establishing boundaries (focusing on 'What' and 'When').",
                        "කළමනාකරණය යනු උපායමාර්ගික, වෙනස්වන සුළු සහ ක්‍රියාකාරී අංශයකි ('කෙසේද' සහ 'කවුද' යන්න පිළිබඳව අවධානය යොමු කරයි). පරිපාලනය යනු ප්‍රතිපත්ති මත පදනම් වූ සහ සීමාවන් ස්ථාපිත කරන ක්‍රියා පටිපාටියකි ('කුමක්ද' සහ 'කවදාද' යන්න පිළිබඳව අවධානය යොමු කරයි)."
                    )
                },
                {
                    title: t("Tall vs. Flat Organizational Structures", "උසස් (Tall) සහ පැතලි (Flat) සංවිධාන ව්‍යුහයන්"),
                    desc: t(
                        "Tall structures provide rigid hierarchy and stability but suffer from slow communication. Flat structures empower employees and enable rapid pivots, matching the modern Agile framework.",
                        "උසස් ව්‍යුහයන් දැඩි ධූරාවලියක් සහ ස්ථාවරත්වයක් ලබා දුන්නද සන්නිවේදනය ප්‍රමාද කරයි. පැතලි ව්‍යුහයන් සේවකයින් සවිබල ගන්වන අතර වේගවත් තීරණ ගැනීමට ඉඩ සලසයි, එය නවීන වේගවත් ක්‍රමවේදයන්ට (Agile) ගැළපේ."
                    )
                },
                {
                    title: t("Scientific vs. Humanistic Management", "විද්‍යාත්මක සහ මානවවාදී කළමනාකරණය"),
                    desc: t(
                        "Taylor's Scientific approach focuses on standardizing tasks for maximum efficiency ('One Best Way'). The Humanistic approach shifts focus to employee well-being, psychology, and engagement.",
                        "ටේලර්ගේ විද්‍යාත්මක ක්‍රමය උපරිම කාර්යක්ෂමතාව සඳහා කාර්යයන් ප්‍රමිතිකරණය කිරීම කෙරෙහි අවධානය යොමු කරයි ('One Best Way'). මානවවාදී ප්‍රවේශය සේවක යහපැවැත්ම, මනෝවිද්‍යාව සහ සක්‍රීය සහභාගීත්වය කෙරෙහි අවධානය යොමු කරයි."
                    )
                }
            ];

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="mb-8">
                        <h2 className="text-2xl md:text-3xl font-extrabold text-brand-500 mb-2 print-text">
                            {t("Theoretical Core Deep Dive", "න්‍යායාත්මක හරය පිළිබඳ ගැඹුරු අධ්‍යයනය")}
                        </h2>
                        <p className="text-slate-400 print-text-muted">
                            {t("Interactive Analysis of Fundamental Traits", "මූලික ලක්ෂණ පිළිබඳ අන්තර්ක්‍රියාකාරී විශ්ලේෂණය")}
                        </p>
                    </div>

                    <div className="grid grid-cols-1 gap-4">
                        {concepts.map((item, i) => (
                            <div key={i} className="glass-panel print-glass p-5 rounded-xl transition-all hover:bg-slate-800/30 group">
                                <div className="flex flex-col md:flex-row gap-6 items-start">
                                    <div className="bg-slate-800/80 print:bg-white text-brand-400 print:text-black w-12 h-12 rounded-lg flex items-center justify-center font-bold text-xl shrink-0 border border-slate-700/50">
                                        0{i+1}
                                    </div>
                                    <div className="flex-1">
                                        <h3 className={`text-lg font-bold text-slate-100 print-text mb-2 ${lang === 'si' ? 'font-sinhala' : ''}`}>

                    hierarchy: t(

                        ["ප්‍රධාන විධායක නිලධාරී / නිෂ්පාදන හිමිකරු", "ස්වාධීන බහු-කාර්ය සාධන කණ්ඩායම්"]
                    ),
                    color: "border-tech-500",
                    bg: "bg-tech-500",
                    text: "text-tech-400"
                },
                hybrid: {
                    id: 'hybrid',
                    name: t("Zenith Hybrid", "සෙනිත් දෙමුහුන් (Hybrid)"),
                    layers: 3,
                    span: t("1:8 (Balanced)", "1:8 (සමබර)"),
                    commSpeed: t("Optimized", "ප්‍රශස්තකරණය කළ"),
                    engagement: "75%",
                    hierarchy: t(
                        ["CEO", "Administrative Core / Dept Heads", "Agile Execution Teams"],
                        ["ප්‍රධාන විධායක නිලධාරී (CEO)", "පරිපාලන හරය / අංශ ප්‍රධානීන්", "වේගවත් මෙහෙයුම් කණ්ඩායම්"]
                    ),
                    color: "border-brand-500",
                    bg: "bg-brand-500",
                    text: "text-brand-400"
                }
            };

            const handleTypeChange = (type) => {
                setIsProcessing(true);
                setTimeout(() => {
                    setOrgType(type);
                    setIsProcessing(false);
                }, 400);
            };

            const current = orgConfigs[orgType];

            return (
                <div className="space-y-6 animate-fade-in flex flex-col">
                    <div className="mb-2 shrink-0">
                        <h2 className="text-2xl md:text-3xl font-extrabold text-brand-500 mb-2 print-text">
                            {t("HRIS Architecture Demo", "HRIS ව්‍යුහාත්මක ආදර්ශනය")}
                        </h2>
                        <p className="text-slate-400 print-text-muted">
                            {t("Live demonstration of organizational restructuring impact.", "ආයතනික ප්‍රතිව්‍යුහගත කිරීමේ බලපෑම පිළිබඳ සජීවී ප්‍රදර්ශනය.")}
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                        
                        {/* Control Panel (System Sidebar) */}
                        <div className="md:col-span-4 glass-panel print-glass rounded-xl border border-slate-800 p-5 flex flex-col gap-6">
                            <div>
                                <h3 className={`text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 flex items-center gap-2 ${lang === 'si' ? 'font-sinhala text-xs' : ''}`}>
                                    <IconSettings /> {t("System Config", "පද්ධති සැකසුම්")}
                                </h3>
                                
                                <div className="space-y-3">
                                    {Object.values(orgConfigs).map(type => (
                                        <button 
                                            key={type.id}
                                            onClick={() => handleTypeChange(type.id)}

                                                orgType === type.id 
                                                    ? `bg-slate-800/80 ${type.color} shadow-lg shadow-slate-900/50` 
                                                    : 'border-slate-800 hover:border-slate-600 text-slate-400 hover:text-slate-200'
                                            }`}
                                        >
                                            <div className={`font-bold text-sm ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>{type.name}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="bg-slate-900/80 p-4 rounded-lg border border-slate-800/80">
                                <div className={`text-xs text-slate-500 mb-3 font-semibold tracking-wider ${lang === 'si' ? 'font-sinhala text-[10px]' : ''}`}>
                                    {t("LIVE SYSTEM METRICS", "සජීවී පද්ධති මිනුම්")}
                                </div>
                                
                                <div className="space-y-4">
                                    <div>
                                        <div className="flex justify-between text-xs mb-1">
                                            <span className={`text-slate-400 ${lang === 'si' ? 'font-sinhala' : ''}`}>{t("Comm. Speed", "සන්නිවේදන වේගය")}</span>
                                            <span className={`font-mono font-bold ${current.text}`}>{current.commSpeed}</span>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between text-xs mb-1">
                                            <span className={`text-slate-400 ${lang === 'si' ? 'font-sinhala' : ''}`}>{t("Est. Engagement", "සේවක සහභාගීත්වය")}</span>
                                            <span className={`font-mono font-bold ${current.text}`}>{current.engagement}</span>
                                        </div>
                                        <div className="w-full bg-slate-800 rounded-full h-1.5 mt-1">
                                            <div className={`${current.bg} h-1.5 rounded-full transition-all duration-500`} style={{width: current.engagement}}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Visualizer (Main HRIS Area) */}
                        <div className="md:col-span-8 glass-panel print-glass rounded-xl border border-slate-800 flex flex-col overflow-hidden relative shadow-2xl">
                            {/* Fake System Topbar */}
                            <div className="bg-slate-900/90 border-b border-slate-800 px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-2 shrink-0">
                                <div className="flex items-center gap-3">
                                    <IconBuilding />
                                    <span className="font-mono text-xs text-slate-300">OrgArchitect™ {t("Workspace", "වැඩතලය")}</span>
                                </div>
                                <div className={`text-[11px] font-mono text-slate-400 ${lang === 'si' ? 'font-sinhala text-[10px]' : ''}`}>
                                    {t("Total Headcount: 250", "මුළු සේවක සංඛ්‍යාව: 250")}
                                </div>
                            </div>

                            {/* Org Chart Visualization Area */}
                            <div className="p-6 bg-slate-950/60 relative flex flex-col items-center justify-start min-h-[350px]">
                                
                                {isProcessing && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-slate-950/90 z-10 backdrop-blur-sm">

                                            <div className="w-8 h-8 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                                            <div className={`text-brand-400 font-mono text-xs animate-pulse ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>
                                                {t("Reallocating Resources...", "ප්‍රතිපත්ති සහ සම්පත් නැවත සකස් කෙරේ...")}
                                            </div>
                                        </div>
                                    </div>
                                )}

                                <div className="text-center mb-6">
                                    <h3 className={`text-xl font-black ${current.text} ${lang === 'si' ? 'font-sinhala' : ''}`}>{current.name}</h3>
                                    <div className={`text-xs text-slate-400 font-mono mt-1 ${lang === 'si' ? 'font-sinhala text-[11px]' : ''}`}>

                                    </div>
                                </div>

                                {/* Dynamic Hierarchy Tree */}
                                <div className="w-full max-w-sm space-y-4 relative">
                                    {/* Vertical connecting line */}
                                    <div className="absolute left-1/2 top-0 bottom-0 w-px bg-slate-800 -translate-x-1/2 z-0"></div>

                                    {current.hierarchy.map((layer, idx) => {
                                        const isLast = idx === current.hierarchy.length - 1;
                                        return (
                                            <div key={idx} className="relative z-10 animate-fade-in" style={{animationDelay: `${idx * 80}ms`}}>
                                                <div className={`
                                                    mx-auto border bg-slate-900 shadow-lg
                                                    flex flex-col items-center justify-center text-center p-3 rounded-lg
                                                    ${isLast ? 'w-full py-5' : 'w-48'}
                                                    ${current.color}
                                                `}>
                                                    <span className={`font-semibold text-slate-200 text-xs sm:text-sm ${lang === 'si' ? 'font-sinhala text-xs' : ''}`}>{layer}</span>
                                                    <span className={`text-[10px] text-slate-500 mt-1 uppercase tracking-wider ${lang === 'si' ? 'font-sinhala text-[8px]' : ''}`}>
                                                        {t("Layer", "මට්ටම")} {idx + 1}
                                                    </span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        // 5.B SYSTEM SIMULATION (KPI Cascade ERP Demo)
        const TabSystemKPI = ({ t, lang }) => {
            const [strategy, setStrategy] = useState('expansion');
            
            const cascadeData = {
                expansion: {
                    title: t("Aggressive Expansion", "වේගවත් ව්‍යාප්තිය"),
                    admin: t("Legal & Capital Acquisition", "නෛතික කටයුතු සහ ප්‍රාග්ධනය ලබා ගැනීම"),
                    mgmt: t("Launch 3 New Regional Hubs", "නව කලාපීය මධ්‍යස්ථාන 3ක් ආරම්භ කිරීම"),
                    agile: t("Onboard 50 Local Vendors/Week", "සතියකට දේශීය සැපයුම්කරුවන් 50ක් බඳවා ගැනීම")
                },
                stability: {
                    title: t("Core Stability & Compliance", "ස්ථාවරත්වය සහ අනුකූලතාවය"),
                    admin: t("Strict Regulatory Audits", "දැඩි නියාමන විගණන කටයුතු"),
                    mgmt: t("Reduce Overhead by 15%", "පොදු වියදම් 15%කින් අඩු කිරීම"),
                    agile: t("Optimize Supply Chain Routes", "සැපයුම් දාම මාර්ග ප්‍රශස්ත කිරීම")
                },
                innovation: {
                    title: t("Digital Transformation", "ඩිජිටල් පරිවර්තනය"),
                    admin: t("IP Protection & R&D Funding", "බුද්ධිමය දේපල ආරක්ෂාව සහ පර්යේෂණ අරමුදල්"),
                    mgmt: t("Develop Custom CRM App", "අභිරුචි CRM මෘදුකාංගයක් නිර්මාණය කිරීම"),
                    agile: t("Push 2 Software Updates/Sprint", "සෑම කාල සීමාවකටම මෘදුකාංග යාවත්කාලීන 2ක් නිකුත් කිරීම")
                }
            };

            const current = cascadeData[strategy];

            return (
                <div className="space-y-6 animate-fade-in flex flex-col">
                    <div className="mb-2 shrink-0">
                        <h2 className="text-2xl md:text-3xl font-extrabold text-brand-500 mb-2 print-text">
                            {t("Strategic KPI Cascade (ERP)", "උපායමාර්ගික KPI ධූරාවලිය (ERP)")}
                        </h2>
                        <p className="text-slate-400 print-text-muted">
                            {t("How Administration policies map down to Agile execution metrics.", "පරිපාලන ප්‍රතිපත්ති මෙහෙයුම් මිනුම් දඬු බවට පත්වන ආකාරය.")}
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 items-stretch">
                        {/* Selector */}
                        <div className="md:col-span-4 glass-panel print-glass p-5 rounded-xl border border-slate-800 flex flex-col justify-center">
                            <h3 className={`text-sm font-bold text-slate-300 uppercase tracking-wider mb-4 ${lang === 'si' ? 'font-sinhala text-xs' : ''}`}>

                            <div className="space-y-3">
                                {Object.entries(cascadeData).map(([key, data]) => (
                                    <button 
                                        key={key} onClick={() => setStrategy(key)}
                                        className={`w-full text-left p-4 rounded-xl border transition-all ${
                                            strategy === key 
                                                ? 'bg-brand-950/30 border-brand-500 text-brand-300 shadow-lg shadow-brand-900/20' 
                                                : 'border-slate-800 hover:bg-slate-800/50 text-slate-400'
                                        }`}
                                    >
                                        <div className={`font-bold text-sm ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>{data.title}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Cascade Viewer */}
                        <div className="md:col-span-8 glass-panel print-glass p-6 rounded-xl border border-slate-800 flex flex-col items-center justify-center relative overflow-hidden min-h-[350px]">

                                    {t("1. Administration (The 'What')", "1. පරිපාලනය ('කුමක්ද' යන්න)")}
                                </div>
                                <h4 className={`text-base sm:text-lg font-semibold text-white ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>{current.admin}</h4>
                                <div className={`text-[10px] text-slate-500 font-semibold italic mt-1 ${lang === 'si' ? 'font-sinhala' : ''}`}>

                                </div>
                            </div>

                            {/* Tier 2: Management */}
                            <div className="relative z-10 bg-slate-900 border-2 border-purple-500 p-5 rounded-xl w-full sm:w-3/4 mb-6 text-center shadow-lg transition-all duration-300">
                                <div className={`text-[10px] font-bold text-purple-400 uppercase tracking-widest mb-2 ${lang === 'si' ? 'font-sinhala text-[9px]' : ''}`}>
                                    {t("2. Management (The 'How')", "2. කළමනාකරණය ('කෙසේද' යන්න)")}
                                </div>
                                <h4 className={`text-base sm:text-lg font-semibold text-white ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>{current.mgmt}</h4>
                                <div className={`text-[10px] text-slate-500 font-semibold italic mt-1 ${lang === 'si' ? 'font-sinhala' : ''}`}>
                                    {t("Management Level - Department Goals", "කළමනාකරණ මට්ටම - දෙපාර්තමේන්තු ඉලක්ක")}
                                </div>
                            </div>

                            {/* Tier 3: Agile */}
                            <div className="relative z-10 bg-slate-900 border-2 border-brand-500 p-5 rounded-xl w-full sm:w-3/4 text-center shadow-lg transition-all duration-300">
                                <div className={`text-[10px] font-bold text-brand-400 uppercase tracking-widest mb-2 ${lang === 'si' ? 'font-sinhala text-[9px]' : ''}`}>
                                    {t("3. Agile Operations (The 'Action')", "3. වේගවත් මෙහෙයුම් ('ක්‍රියාව')")}
                                </div>
                                <h4 className={`text-base sm:text-lg font-semibold text-white ${lang === 'si' ? 'font-sinhala text-sm' : ''}`}>{current.agile}</h4>
                                <div className={`text-[10px] text-slate-500 font-semibold italic mt-1 ${lang === 'si' ? 'font-sinhala' : ''}`}>
                                    {t("Operational Level - Fast Tasks", "මෙහෙයුම් මට්ටම - කඩිනම් කාර්යයන්")}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 5.C SYSTEM SIMULATION (Workflow Mgmt Simulator)
        const TabSystemWorkflow = ({ t, lang }) => {
            const [model, setModel] = useState('scientific');

            return (
                <div className="space-y-6 animate-fade-in flex flex-col">
                    <div className="mb-2 shrink-0">
                        <h2 className="text-2xl md:text-3xl font-extrabold text-brand-500 mb-2 print-text">
                            {t("Workflow Management Simulator", "වැඩ ප්‍රවාහ කළමනාකරණ අනුකරණය")}
                        </h2>
                        <p className="text-slate-400 print-text-muted">
                            {t("Comparing Taylor's Scientific Management vs. Modern Agile Workflows.", "ටේලර්ගේ විද්‍යාත්මක කළමනාකරණය සහ නවීන වේගවත් (Agile) ක්‍රමවේද සැසඳීම.")}
                        </p>
                    </div>

                    <div className="glass-panel print-glass rounded-xl border border-slate-800 p-6 flex flex-col">
                        
                        {/* Toggle */}
                        <div className="flex justify-center mb-8 shrink-0">
                            <div className="bg-slate-900 p-1 rounded-xl flex border border-slate-800">
                                <button 
                                    onClick={() => setModel('scientific')} 
                                    className={`px-4 sm:px-6 py-2 rounded-lg font-semibold text-xs sm:text-sm transition-all ${
                                        model === 'scientific' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    {t("Scientific (Linear)", "විද්‍යාත්මක (රේඛීය)")}
                                </button>
                                <button 
                                    onClick={() => setModel('agile')} 
                                    className={`px-4 sm:px-6 py-2 rounded-lg font-semibold text-xs sm:text-sm transition-all ${
                                        model === 'agile' ? 'bg-brand-500 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'
                                    }`}
                                >
                                    {t("Agile (Iterative)", "වේගවත් (චක්‍රීය)")}
                                </button>
                            </div>

                t(

                                            {t("BILINGUAL PRACTICUM", "ද්විභාෂා ප්‍රායෝගික පුහුණුව")}

                            </div>
                        </header>

                        {/* Dynamic Tab Content Wrapper */}
                        <div className="flex-1 p-6 md:p-10">
                            <div className="max-w-5xl mx-auto h-full">
                                {activeTab === 'case' && <TabCaseInsight t={t} lang={lang} />}
                                {activeTab === 'deepdive' && <TabDeepDive t={t} lang={lang} />}
                                {activeTab === 'scenario' && <TabScenarioSuite t={t} lang={lang} />}
                                {activeTab === 'diagnostic' && <TabDiagnosticLab t={t} lang={lang} />}
                                {activeTab === 'system-hris' && <TabSystemSimulation t={t} lang={lang} />}
                                {activeTab === 'system-kpi' && <TabSystemKPI t={t} lang={lang} />}
                                {activeTab === 'system-workflow' && <TabSystemWorkflow t={t} lang={lang} />}
                                {activeTab === 'breakout' && <TabBreakoutRooms t={t} lang={lang} />}
                            </div>
                        </div>
                    </main>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
